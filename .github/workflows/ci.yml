name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Import smoke test
        # Importa cada módulo top-level pra garantir que o código compila e
        # as deps estão coerentes. Não roda Playwright — só valida sintaxe.
        env:
          GEMINI_API_KEY: dummy-key-for-import-only
        run: |
          python -c "from app.database import init_db, Base, Subject, Event, DoneEvent, Meta"
          python -c "from app import repository"
          python -c "from app.scraper import ScraperService, current_semester"
          python -c "from app.calendar_sync import CalendarSyncService"
          python -c "from app.parser import ParserService"
          python -c "from app.main import app"

  frontend:
    name: Frontend (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
